apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-showcase
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: gitops-showcase
  source:
    repoURL: https://github.com/lostspy009/gitops.git
    targetRevision: main
    path: showcase/apps/gitops-showcase/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops-showcase
  revisionHistoryLimit: 10
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
