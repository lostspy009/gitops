apiVersion: v1
kind: ConfigMap
metadata:
  name: gitops-showcase-ui
data:
  default.conf: |
    server {
      listen       8080;
      listen  [::]:8080;
      server_name  _;

      root   /usr/share/nginx/html;
      index  index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
      }
    }
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>OpenShift GitOps Showcase</title>
      <style>
        :root {
          --bg: #06131f;
          --panel: rgba(9, 28, 43, 0.86);
          --panel-border: rgba(255, 255, 255, 0.1);
          --text: #eaf2f8;
          --muted: #9bb6c9;
          --accent: #ff4f8b;
          --accent-2: #7c5cff;
          --success: #33d17a;
          --warning: #f6d32d;
          --shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        }

        * { box-sizing: border-box; }
        body {
          margin: 0;
          font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          color: var(--text);
          background:
            radial-gradient(circle at top left, rgba(124, 92, 255, 0.35), transparent 35%),
            radial-gradient(circle at top right, rgba(255, 79, 139, 0.3), transparent 28%),
            linear-gradient(135deg, #02060a 0%, #04111d 50%, #081b2f 100%);
          min-height: 100vh;
        }

        .shell {
          width: min(1180px, calc(100% - 32px));
          margin: 0 auto;
          padding: 32px 0 56px;
        }

        .hero {
          position: relative;
          overflow: hidden;
          border: 1px solid var(--panel-border);
          border-radius: 28px;
          padding: 40px;
          background: linear-gradient(160deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
          backdrop-filter: blur(18px);
          box-shadow: var(--shadow);
        }

        .hero::after {
          content: "";
          position: absolute;
          inset: -30% auto auto 65%;
          width: 320px;
          height: 320px;
          background: radial-gradient(circle, rgba(255,79,139,0.35), transparent 60%);
          filter: blur(12px);
        }

        .badge {
          display: inline-flex;
          align-items: center;
          gap: 10px;
          padding: 8px 14px;
          border-radius: 999px;
          background: rgba(51, 209, 122, 0.12);
          color: #b8ffd6;
          font-weight: 700;
          letter-spacing: 0.04em;
          text-transform: uppercase;
          font-size: 0.76rem;
        }

        .badge::before {
          content: "";
          width: 10px;
          height: 10px;
          border-radius: 50%;
          background: var(--success);
          box-shadow: 0 0 16px var(--success);
        }

        h1 {
          font-size: clamp(2.7rem, 6vw, 4.8rem);
          line-height: 0.96;
          margin: 22px 0 18px;
          max-width: 760px;
        }

        .gradient {
          background: linear-gradient(90deg, #ffffff, #9ad9ff 40%, #ff8bb7 95%);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
        }

        .hero p {
          max-width: 720px;
          color: var(--muted);
          font-size: 1.05rem;
          line-height: 1.7;
          margin-bottom: 24px;
        }

        .hero-grid,
        .cards,
        .principles {
          display: grid;
          gap: 18px;
        }

        .hero-grid {
          grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
          margin-top: 28px;
        }

        .panel {
          border: 1px solid var(--panel-border);
          background: var(--panel);
          border-radius: 22px;
          padding: 22px;
          box-shadow: var(--shadow);
        }

        .stat {
          font-size: 2rem;
          font-weight: 800;
          margin-top: 8px;
        }

        .muted { color: var(--muted); }

        .section-title {
          display: flex;
          justify-content: space-between;
          align-items: flex-end;
          gap: 12px;
          margin: 30px 0 16px;
        }

        .section-title h2 {
          margin: 0;
          font-size: 1.5rem;
        }

        .cards {
          grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .card-title {
          font-size: 1.1rem;
          font-weight: 700;
          margin-bottom: 10px;
        }

        .chip-row {
          display: flex;
          flex-wrap: wrap;
          gap: 10px;
          margin-top: 14px;
        }

        .chip {
          padding: 8px 12px;
          border-radius: 999px;
          background: rgba(124, 92, 255, 0.14);
          color: #d9d0ff;
          font-size: 0.86rem;
          border: 1px solid rgba(124, 92, 255, 0.28);
        }

        .principles {
          grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .principle strong {
          display: block;
          margin-bottom: 10px;
          font-size: 1rem;
        }

        .timeline {
          display: grid;
          gap: 14px;
        }

        .timeline-step {
          display: grid;
          grid-template-columns: 56px 1fr;
          gap: 16px;
          align-items: start;
        }

        .step-no {
          width: 56px;
          height: 56px;
          display: grid;
          place-items: center;
          border-radius: 18px;
          background: linear-gradient(135deg, var(--accent-2), var(--accent));
          font-weight: 800;
          font-size: 1.1rem;
        }

        .footer {
          margin-top: 26px;
          padding-top: 18px;
          border-top: 1px solid rgba(255,255,255,0.08);
          display: flex;
          flex-wrap: wrap;
          justify-content: space-between;
          gap: 12px;
          color: var(--muted);
          font-size: 0.95rem;
        }

        .pulse {
          color: var(--warning);
          font-weight: 700;
        }

        @media (max-width: 720px) {
          .hero { padding: 26px; }
          .timeline-step { grid-template-columns: 1fr; }
        }
      </style>
    </head>
    <body>
      <main class="shell">
        <section class="hero">
          <span class="badge">Live on OpenShift · Managed by Argo CD</span>
          <h1><span class="gradient">GitOps that looks production-ready.</span></h1>
          <p>
            This sample application is intentionally designed as a showcase deployment: polished UI,
            OpenShift-native exposure through a Route, automated reconciliation through Argo CD,
            and a repository structure that is ready for platform demos, workshops, and executive walkthroughs.
          </p>

          <div class="hero-grid">
            <div class="panel">
              <div class="muted">Deployment model</div>
              <div class="stat">Declarative</div>
              <div class="muted">Everything lives in Git and syncs automatically.</div>
            </div>
            <div class="panel">
              <div class="muted">Platform target</div>
              <div class="stat">OpenShift</div>
              <div class="muted">Route-enabled and aligned to cluster-friendly defaults.</div>
            </div>
            <div class="panel">
              <div class="muted">Demo value</div>
              <div class="stat">High impact</div>
              <div class="muted">A crisp landing page for GitOps storytelling.</div>
            </div>
          </div>
        </section>

        <div class="section-title">
          <h2>What makes this demo impressive</h2>
          <span class="muted">Made for platform teams and stakeholders</span>
        </div>
        <section class="cards">
          <article class="panel">
            <div class="card-title">Argo CD Ready</div>
            <div class="muted">The repository includes an Argo CD Application and AppProject so onboarding is fast and repeatable.</div>
            <div class="chip-row">
              <span class="chip">Auto-sync</span>
              <span class="chip">Self-heal</span>
              <span class="chip">Prune</span>
            </div>
          </article>
          <article class="panel">
            <div class="card-title">OpenShift Native</div>
            <div class="muted">The app is published with a Route and uses secure, non-root container settings suited to OpenShift clusters.</div>
            <div class="chip-row">
              <span class="chip">Route</span>
              <span class="chip">Restricted friendly</span>
              <span class="chip">Kubernetes standard</span>
            </div>
          </article>
          <article class="panel">
            <div class="card-title">Production-minded</div>
            <div class="muted">Health probes, disruption budget, resource requests, and autoscaling signals are included out of the box.</div>
            <div class="chip-row">
              <span class="chip">Probes</span>
              <span class="chip">PDB</span>
              <span class="chip">HPA</span>
            </div>
          </article>
        </section>

        <div class="section-title">
          <h2>GitOps principles in action</h2>
          <span class="pulse">Status: In sync and always reconciling</span>
        </div>
        <section class="principles">
          <article class="panel principle">
            <strong>Single source of truth</strong>
            <span class="muted">The desired state is versioned in Git, reviewable through pull requests, and auditable after every change.</span>
          </article>
          <article class="panel principle">
            <strong>Automated reconciliation</strong>
            <span class="muted">Argo CD continuously compares the cluster with Git and corrects drift without manual effort.</span>
          </article>
          <article class="panel principle">
            <strong>Repeatable onboarding</strong>
            <span class="muted">Namespaces, deployment objects, routing, and scaling policy are shipped as reusable manifests.</span>
          </article>
          <article class="panel principle">
            <strong>Fast storytelling</strong>
            <span class="muted">A visually rich app proves that GitOps can deliver both operational rigor and user-facing polish.</span>
          </article>
        </section>

        <div class="section-title">
          <h2>How the flow works</h2>
          <span class="muted">From commit to cluster in minutes</span>
        </div>
        <section class="panel timeline">
          <div class="timeline-step">
            <div class="step-no">1</div>
            <div>
              <strong>Commit a change</strong>
              <div class="muted">Update the manifests or page content in Git and push to the repository.</div>
            </div>
          </div>
          <div class="timeline-step">
            <div class="step-no">2</div>
            <div>
              <strong>Argo CD detects drift</strong>
              <div class="muted">The application notices a new revision and compares the desired and live states.</div>
            </div>
          </div>
          <div class="timeline-step">
            <div class="step-no">3</div>
            <div>
              <strong>OpenShift reconciles safely</strong>
              <div class="muted">Deployment rollout, health checks, and routing updates happen using native OpenShift resources.</div>
            </div>
          </div>
          <div class="timeline-step">
            <div class="step-no">4</div>
            <div>
              <strong>Stakeholders see the result</strong>
              <div class="muted">The refreshed experience becomes visible through the Route without snowflake steps or manual cluster edits.</div>
            </div>
          </div>
        </section>

        <section class="footer">
          <span>Repository-driven delivery · OpenShift platform engineering demo</span>
          <span id="timestamp">Rendered from GitOps manifests</span>
        </section>
      </main>

      <script>
        const timestamp = document.getElementById('timestamp');
        const now = new Date();
        timestamp.textContent = `Last rendered ${now.toLocaleString()} · Powered by Argo CD`;
      </script>
    </body>
    </html>
